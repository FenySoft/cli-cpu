<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    background: #0d1117;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .card {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1a1f2b 100%);
    border: 1px solid #30363d;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 40%, rgba(88,166,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(63,185,80,0.06) 0%, transparent 50%);
  }
  .grid {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 3px;
    padding: 20px;
    opacity: 0.12;
  }
  .cell {
    border: 1px solid #58a6ff;
    border-radius: 4px;
  }
  .cell.rich { background: rgba(88,166,255,0.3); border-color: #58a6ff; }
  .cell.nano { background: rgba(63,185,80,0.2); border-color: #3fb950; }
  .cell.secure { background: rgba(210,153,34,0.3); border-color: #d29922; }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
  }
  .logo {
    font-family: 'SF Mono', 'Consolas', monospace;
    font-size: 28px;
    color: #58a6ff;
    letter-spacing: 4px;
    margin-bottom: 24px;
  }
  .title {
    font-size: 52px;
    font-weight: 800;
    color: #f0f6fc;
    line-height: 1.2;
    margin-bottom: 20px;
    max-width: 900px;
  }
  .subtitle {
    font-size: 22px;
    color: #8b949e;
    max-width: 700px;
    line-height: 1.5;
  }
  .badge {
    margin-top: 32px;
    display: flex;
    gap: 16px;
  }
  .badge span {
    font-family: 'SF Mono', 'Consolas', monospace;
    font-size: 14px;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid #30363d;
    color: #8b949e;
  }
  .badge .green { color: #3fb950; border-color: #238636; }
  .badge .blue { color: #58a6ff; border-color: #1f6feb; }
</style>
</head>
<body>
  <div class="card">
    <div class="grid">
      <div class="cell rich"></div><div class="cell rich"></div><div class="cell rich"></div>
      <div class="cell rich"></div><div class="cell rich"></div><div class="cell rich"></div>
      <div class="cell secure"></div><div class="cell"></div>
      <div class="cell nano"></div><div class="cell nano"></div><div class="cell nano"></div>
      <div class="cell nano"></div><div class="cell nano"></div><div class="cell nano"></div>
      <div class="cell nano"></div><div class="cell nano"></div>
      <div class="cell nano"></div><div class="cell nano"></div><div class="cell nano"></div>
      <div class="cell nano"></div><div class="cell nano"></div><div class="cell nano"></div>
      <div class="cell nano"></div><div class="cell nano"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div>
    </div>
    <div class="content">
      <div class="logo">CLI-CPU</div>
      <div class="title">Native .NET on Silicon</div>
      <div class="subtitle">23 cores. Zero cache coherency. Shared-nothing. Actor-native.</div>
      <div class="badge">
        <span class="green">6 Rich + 16 Nano + 1 Secure</span>
        <span class="blue">CERN-OHL-S v2</span>
        <span>clicpu.org</span>
      </div>
    </div>
  </div>
</body>
</html>
