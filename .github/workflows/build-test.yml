name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CLI-CPU.sln

      - name: Build
        run: dotnet build CLI-CPU.sln -c Debug --no-restore

      - name: Test
        run: dotnet test CLI-CPU.sln -c Debug --no-build --verbosity minimal
