<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif">
  <rect width="800" height="450" fill="#0d1117"/>
  <text x="400" y="35" text-anchor="middle" fill="#f0f6fc" font-size="20" font-weight="700">J/token — LLaMA-70B INT4 (lower = better)</text>
  <text x="400" y="55" text-anchor="middle" fill="#8b949e" font-size="12">Energy per generated token, in Joules</text>
  <line x1="180" y1="80" x2="180" y2="380" stroke="#30363d" stroke-width="1"/>
  <rect x="182" y="95" width="6" height="35" rx="2" fill="#3fb950"/>
  <text x="140" y="118" text-anchor="end" fill="#f0f6fc" font-size="13" font-weight="600">CFPU H</text>
  <text x="195" y="118" fill="#3fb950" font-size="13" font-weight="700">0.13–0.26</text>
  <text x="310" y="118" fill="#8b949e" font-size="11">28–56x better</text>
  <rect x="182" y="145" width="6" height="35" rx="2" fill="#58a6ff"/>
  <text x="140" y="168" text-anchor="end" fill="#c9d1d9" font-size="13">Groq 5nm</text>
  <text x="195" y="168" fill="#58a6ff" font-size="13">0.21</text>
  <text x="260" y="168" fill="#8b949e" font-size="11">(does not exist)</text>
  <rect x="182" y="195" width="48" height="35" rx="2" fill="#d29922"/>
  <text x="140" y="218" text-anchor="end" fill="#c9d1d9" font-size="13">TPU v5e</text>
  <text x="237" y="218" fill="#d29922" font-size="13">~3.2</text>
  <rect x="182" y="245" width="110" height="35" rx="2" fill="#f85149"/>
  <text x="140" y="268" text-anchor="end" fill="#c9d1d9" font-size="13">H100</text>
  <text x="299" y="268" fill="#f85149" font-size="13" font-weight="700">7.3</text>
  <rect x="182" y="295" width="285" height="35" rx="2" fill="#da3633"/>
  <text x="140" y="318" text-anchor="end" fill="#c9d1d9" font-size="13">QC AI100U</text>
  <text x="474" y="318" fill="#da3633" font-size="13">~19</text>
  <rect x="182" y="345" width="600" height="35" rx="2" fill="#8b0000"/>
  <text x="140" y="368" text-anchor="end" fill="#c9d1d9" font-size="13">Groq v1</text>
  <text x="730" y="368" fill="#8b949e" font-size="11">~486</text>
  <text x="400" y="368" fill="#f0f6fc" font-size="11">(576 chips, 14nm)</text>
  <rect x="520" y="90" width="12" height="12" rx="2" fill="#3fb950"/>
  <text x="538" y="101" fill="#8b949e" font-size="11">CFPU (projection)</text>
  <rect x="520" y="110" width="12" height="12" rx="2" fill="#f85149"/>
  <text x="538" y="121" fill="#8b949e" font-size="11">Measured / estimated</text>
  <text x="400" y="430" text-anchor="middle" fill="#8b949e" font-size="11">~80% of NVIDIA's energy goes to HBM reads — CFPU has 0 bytes of memory traffic from SRAM</text>
</svg>
