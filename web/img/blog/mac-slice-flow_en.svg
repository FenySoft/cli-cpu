<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace">
  <rect width="800" height="400" fill="#0d1117"/>
  <text x="400" y="30" text-anchor="middle" fill="#f0f6fc" font-size="18" font-weight="700" font-family="-apple-system, sans-serif">MAC Slice Data Flow — Weight-Stationary, Systolic Pipeline</text>
  <rect x="200" y="60" width="400" height="280" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="400" y="85" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="600">MAC Slice (8x8 INT8)</text>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3fb950"/></marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/></marker>
  </defs>
  <line x1="40" y1="160" x2="195" y2="160" stroke="#3fb950" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="30" y="145" fill="#3fb950" font-size="11">W→E link</text>
  <text x="30" y="175" fill="#8b949e" font-size="10">8 bytes</text>
  <text x="30" y="188" fill="#8b949e" font-size="10">activation</text>
  <rect x="220" y="100" width="160" height="55" rx="6" fill="#1a3a5c" stroke="#58a6ff" stroke-width="1"/>
  <text x="300" y="120" text-anchor="middle" fill="#58a6ff" font-size="11">SRAM (8–256 KB)</text>
  <text x="300" y="138" text-anchor="middle" fill="#8b949e" font-size="10">weights stay in place — NEVER move</text>
  <line x1="300" y1="158" x2="300" y2="175" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrB)"/>
  <text x="310" y="170" fill="#8b949e" font-size="9">64 bytes/cycle</text>
  <rect x="240" y="180" width="120" height="70" rx="4" fill="#0d2137" stroke="#58a6ff" stroke-width="1"/>
  <text x="300" y="210" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="600">8x8 MAC</text>
  <text x="300" y="228" text-anchor="middle" fill="#3fb950" font-size="10">64 MACs/cycle</text>
  <text x="300" y="243" text-anchor="middle" fill="#8b949e" font-size="9">+ zero-skip sparsity</text>
  <rect x="420" y="110" width="80" height="40" rx="4" fill="#1a1a2e" stroke="#d2a8ff" stroke-width="1"/>
  <text x="460" y="125" text-anchor="middle" fill="#d2a8ff" font-size="10">FSM</text>
  <text x="460" y="140" text-anchor="middle" fill="#8b949e" font-size="8">WS / AS mode</text>
  <rect x="240" y="270" width="120" height="50" rx="4" fill="#2d1a0d" stroke="#d29922" stroke-width="1"/>
  <text x="300" y="290" text-anchor="middle" fill="#d29922" font-size="10">Post-MAC</text>
  <text x="300" y="305" text-anchor="middle" fill="#8b949e" font-size="9">ReLU→Quant→Pool</text>
  <line x1="300" y1="253" x2="300" y2="267" stroke="#d29922" stroke-width="1.5"/>
  <line x1="365" y1="295" x2="610" y2="295" stroke="#3fb950" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="620" y="280" fill="#3fb950" font-size="11">output</text>
  <text x="620" y="310" fill="#8b949e" font-size="10">8 bytes INT8</text>
  <text x="680" y="160" fill="#8b949e" font-size="10">128-bit systolic</text>
  <text x="680" y="175" fill="#8b949e" font-size="10">link: 16 bytes/cc</text>
  <rect x="420" y="180" width="160" height="90" rx="6" fill="none" stroke="#30363d" stroke-width="1" stroke-dasharray="4"/>
  <text x="500" y="200" text-anchor="middle" fill="#8b949e" font-size="10">Logic: 0.0135 mm²</text>
  <text x="500" y="216" text-anchor="middle" fill="#8b949e" font-size="10">SRAM: 8–256 KB</text>
  <text x="500" y="232" text-anchor="middle" fill="#8b949e" font-size="10">Cluster: 2x4 (8 slices)</text>
  <text x="500" y="248" text-anchor="middle" fill="#8b949e" font-size="10">512 MACs/cluster/cc</text>
  <text x="500" y="264" text-anchor="middle" fill="#3fb950" font-size="10">No CPU — FSM controlled</text>
  <text x="400" y="380" text-anchor="middle" fill="#8b949e" font-size="11" font-family="-apple-system, sans-serif">Weights are loaded ONCE and NEVER move — unlike GPUs which read from HBM for every token</text>
</svg>
