<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="900" height="300" fill="#0d1117" rx="12"/>

  <!-- Left: Wormhole = DEADLOCK -->
  <g transform="translate(20, 20)">
    <rect width="420" height="260" fill="#161b22" stroke="#f85149" stroke-width="2" rx="8"/>
    <text x="210" y="30" fill="#f85149" font-size="15" font-weight="700" text-anchor="middle">Wormhole Routing = DEADLOCK</text>
    <text x="210" y="48" fill="#8b949e" font-size="11" text-anchor="middle">A csomag egyszerre több routerben van ("kígyó")</text>

    <!-- Routers -->
    <rect x="40" y="80" width="60" height="40" fill="#2a1a1a" stroke="#f85149" rx="6"/>
    <text x="70" y="105" fill="#f85149" font-size="11" text-anchor="middle">R1</text>
    <rect x="140" y="80" width="60" height="40" fill="#2a1a1a" stroke="#f85149" rx="6"/>
    <text x="170" y="105" fill="#f85149" font-size="11" text-anchor="middle">R2</text>
    <rect x="240" y="80" width="60" height="40" fill="#2a1a1a" stroke="#f85149" rx="6"/>
    <text x="270" y="105" fill="#f85149" font-size="11" text-anchor="middle">R3</text>
    <rect x="340" y="80" width="60" height="40" fill="#2a1a1a" stroke="#f85149" rx="6"/>
    <text x="370" y="105" fill="#f85149" font-size="11" text-anchor="middle">R4</text>

    <!-- Snake A (green, going right) -->
    <path d="M55,95 L155,95 L255,95" stroke="#3fb950" stroke-width="8" fill="none" opacity="0.6" stroke-linecap="round"/>
    <text x="155" y="85" fill="#3fb950" font-size="10" font-weight="600" text-anchor="middle">Csomag A →</text>

    <!-- Snake B (blue, going left) -->
    <path d="M355,105 L255,105 L155,105" stroke="#58a6ff" stroke-width="8" fill="none" opacity="0.6" stroke-linecap="round"/>
    <text x="275" y="130" fill="#58a6ff" font-size="10" font-weight="600" text-anchor="middle">← Csomag B</text>

    <!-- Deadlock circle -->
    <circle cx="210" cy="175" r="30" fill="none" stroke="#f85149" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="210" y="172" fill="#f85149" font-size="16" font-weight="700" text-anchor="middle">DEAD</text>
    <text x="210" y="188" fill="#f85149" font-size="16" font-weight="700" text-anchor="middle">LOCK</text>

    <!-- Explanation -->
    <text x="210" y="225" fill="#c9d1d9" font-size="10" text-anchor="middle">A vár B-re, B vár A-ra</text>
    <text x="210" y="240" fill="#c9d1d9" font-size="10" text-anchor="middle">Mindkét "kígyó" 3 routert foglal egyszerre</text>
    <text x="210" y="255" fill="#f85149" font-size="10" font-weight="600" text-anchor="middle">→ Körös foglalás → Rendszer lefagy</text>
  </g>

  <!-- Right: Store-and-forward = NO DEADLOCK -->
  <g transform="translate(460, 20)">
    <rect width="420" height="260" fill="#161b22" stroke="#3fb950" stroke-width="2" rx="8"/>
    <text x="210" y="30" fill="#3fb950" font-size="15" font-weight="700" text-anchor="middle">CFPU Hibrid = NINCS DEADLOCK</text>
    <text x="210" y="48" fill="#8b949e" font-size="11" text-anchor="middle">Wormhole (L0, XY) + VCT (L1–L3) + VOQ + credit</text>

    <!-- Routers - step 1 -->
    <rect x="40" y="75" width="60" height="40" fill="#1a2a1a" stroke="#3fb950" rx="6"/>
    <text x="70" y="100" fill="#3fb950" font-size="11" text-anchor="middle">R1</text>
    <rect x="140" y="75" width="60" height="40" fill="#0d1117" stroke="#30363d" rx="6"/>
    <text x="170" y="100" fill="#8b949e" font-size="11" text-anchor="middle">R2</text>
    <rect x="240" y="75" width="60" height="40" fill="#0d1117" stroke="#30363d" rx="6"/>
    <text x="270" y="100" fill="#8b949e" font-size="11" text-anchor="middle">R3</text>

    <!-- Packet in R1 -->
    <rect x="48" y="82" width="44" height="26" fill="#3fb950" opacity="0.3" rx="4"/>
    <text x="70" y="70" fill="#3fb950" font-size="9" font-weight="600" text-anchor="middle">80B cella</text>

    <!-- Arrow -->
    <path d="M105,95 L135,95" stroke="#3fb950" stroke-width="2" fill="none" marker-end="url(#arrowG)"/>

    <!-- Step 2 -->
    <rect x="40" y="145" width="60" height="40" fill="#0d1117" stroke="#30363d" rx="6"/>
    <text x="70" y="170" fill="#8b949e" font-size="11" text-anchor="middle">R1</text>
    <text x="70" y="137" fill="#3fb950" font-size="9" text-anchor="middle">SZABAD</text>
    <rect x="140" y="145" width="60" height="40" fill="#1a2a1a" stroke="#3fb950" rx="6"/>
    <text x="170" y="170" fill="#3fb950" font-size="11" text-anchor="middle">R2</text>
    <rect x="240" y="145" width="60" height="40" fill="#0d1117" stroke="#30363d" rx="6"/>
    <text x="270" y="170" fill="#8b949e" font-size="11" text-anchor="middle">R3</text>

    <!-- Packet in R2 -->
    <rect x="148" y="152" width="44" height="26" fill="#3fb950" opacity="0.3" rx="4"/>
    <path d="M205,165 L235,165" stroke="#3fb950" stroke-width="2" fill="none" marker-end="url(#arrowG)"/>

    <!-- Explanation -->
    <text x="210" y="210" fill="#c9d1d9" font-size="10" text-anchor="middle">L0: XY routing → aciklikus csatornák (Dally 1987)</text>
    <text x="210" y="228" fill="#c9d1d9" font-size="10" text-anchor="middle">L1–L3: VCT → nincs láncos buffer-foglalás</text>
    <text x="210" y="252" fill="#3fb950" font-size="11" font-weight="600" text-anchor="middle">→ Deadlock lehetetlen by construction</text>
  </g>

  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3fb950"/>
    </marker>
  </defs>
</svg>
