<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="900" height="520" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" fill="#f0f6fc" font-size="18" font-weight="700" text-anchor="middle">Why none of them work — Topology comparison at 10,000+ cores</text>
  <text x="450" y="58" fill="#8b949e" font-size="12" text-anchor="middle">Each topology fails at chip-scale for a different reason</text>

  <!-- 1. Flat Mesh -->
  <g transform="translate(30, 80)">
    <rect width="200" height="200" fill="#161b22" stroke="#30363d" rx="8"/>
    <text x="100" y="24" fill="#f0f6fc" font-size="14" font-weight="600" text-anchor="middle">Flat Mesh</text>
    <!-- Grid -->
    <g stroke="#3a5a3a" stroke-width="1" fill="none">
      <line x1="40" y1="60" x2="40" y2="170"/><line x1="70" y1="60" x2="70" y2="170"/>
      <line x1="100" y1="60" x2="100" y2="170"/><line x1="130" y1="60" x2="130" y2="170"/>
      <line x1="160" y1="60" x2="160" y2="170"/>
      <line x1="40" y1="60" x2="160" y2="60"/><line x1="40" y1="85" x2="160" y2="85"/>
      <line x1="40" y1="110" x2="160" y2="110"/><line x1="40" y1="135" x2="160" y2="135"/>
      <line x1="40" y1="160" x2="160" y2="160"/>
    </g>
    <!-- Nodes -->
    <g fill="#3fb950">
      <circle cx="40" cy="60" r="4"/><circle cx="70" cy="60" r="4"/><circle cx="100" cy="60" r="4"/><circle cx="130" cy="60" r="4"/><circle cx="160" cy="60" r="4"/>
      <circle cx="40" cy="85" r="4"/><circle cx="70" cy="85" r="4"/><circle cx="100" cy="85" r="4"/><circle cx="130" cy="85" r="4"/><circle cx="160" cy="85" r="4"/>
      <circle cx="40" cy="110" r="4"/><circle cx="70" cy="110" r="4"/><circle cx="100" cy="110" r="4"/><circle cx="130" cy="110" r="4"/><circle cx="160" cy="110" r="4"/>
      <circle cx="40" cy="135" r="4"/><circle cx="70" cy="135" r="4"/><circle cx="100" cy="135" r="4"/><circle cx="130" cy="135" r="4"/><circle cx="160" cy="135" r="4"/>
      <circle cx="40" cy="160" r="4"/><circle cx="70" cy="160" r="4"/><circle cx="100" cy="160" r="4"/><circle cx="130" cy="160" r="4"/><circle cx="160" cy="160" r="4"/>
    </g>
    <!-- Worst path -->
    <path d="M40,60 L160,60 L160,160" stroke="#f85149" stroke-width="2.5" fill="none" stroke-dasharray="4,3"/>
    <circle cx="40" cy="60" r="6" fill="none" stroke="#f85149" stroke-width="2"/>
    <circle cx="160" cy="160" r="6" fill="none" stroke="#f85149" stroke-width="2"/>
    <text x="100" y="192" fill="#f85149" font-size="11" font-weight="600" text-anchor="middle">~200 hop worst-case</text>
  </g>

  <!-- 2. Fat Tree -->
  <g transform="translate(245, 80)">
    <rect width="200" height="200" fill="#161b22" stroke="#30363d" rx="8"/>
    <text x="100" y="24" fill="#f0f6fc" font-size="14" font-weight="600" text-anchor="middle">Fat Tree / Clos</text>
    <!-- Tree -->
    <g stroke="#3a5a7a" stroke-width="1.5" fill="none">
      <!-- Root -->
      <line x1="100" y1="55" x2="60" y2="90"/>
      <line x1="100" y1="55" x2="140" y2="90"/>
      <!-- L2 -->
      <line x1="60" y1="90" x2="35" y2="125"/><line x1="60" y1="90" x2="85" y2="125"/>
      <line x1="140" y1="90" x2="115" y2="125"/><line x1="140" y1="90" x2="165" y2="125"/>
      <!-- L1 -->
      <line x1="35" y1="125" x2="25" y2="160"/><line x1="35" y1="125" x2="45" y2="160"/>
      <line x1="85" y1="125" x2="75" y2="160"/><line x1="85" y1="125" x2="95" y2="160"/>
      <line x1="115" y1="125" x2="105" y2="160"/><line x1="115" y1="125" x2="125" y2="160"/>
      <line x1="165" y1="125" x2="155" y2="160"/><line x1="165" y1="125" x2="175" y2="160"/>
    </g>
    <!-- Root bottleneck -->
    <circle cx="100" cy="55" r="8" fill="#f85149" opacity="0.3"/>
    <circle cx="100" cy="55" r="5" fill="#58a6ff"/>
    <!-- Switches -->
    <g fill="#58a6ff">
      <rect x="55" y="85" width="10" height="10" rx="2"/><rect x="135" y="85" width="10" height="10" rx="2"/>
      <rect x="30" y="120" width="10" height="10" rx="2"/><rect x="80" y="120" width="10" height="10" rx="2"/>
      <rect x="110" y="120" width="10" height="10" rx="2"/><rect x="160" y="120" width="10" height="10" rx="2"/>
    </g>
    <!-- Leaves -->
    <g fill="#3fb950">
      <circle cx="25" cy="160" r="3"/><circle cx="45" cy="160" r="3"/><circle cx="75" cy="160" r="3"/><circle cx="95" cy="160" r="3"/>
      <circle cx="105" cy="160" r="3"/><circle cx="125" cy="160" r="3"/><circle cx="155" cy="160" r="3"/><circle cx="175" cy="160" r="3"/>
    </g>
    <text x="100" y="182" fill="#f85149" font-size="10" font-weight="600" text-anchor="middle">Root bottleneck</text>
    <text x="100" y="194" fill="#f85149" font-size="10" font-weight="600" text-anchor="middle">Not 2D silicon</text>
  </g>

  <!-- 3. Torus -->
  <g transform="translate(460, 80)">
    <rect width="200" height="200" fill="#161b22" stroke="#30363d" rx="8"/>
    <text x="100" y="24" fill="#f0f6fc" font-size="14" font-weight="600" text-anchor="middle">3D Torus</text>
    <!-- Grid -->
    <g stroke="#3a5a3a" stroke-width="1" fill="none">
      <line x1="50" y1="65" x2="50" y2="155"/><line x1="85" y1="65" x2="85" y2="155"/>
      <line x1="120" y1="65" x2="120" y2="155"/><line x1="155" y1="65" x2="155" y2="155"/>
      <line x1="50" y1="65" x2="155" y2="65"/><line x1="50" y1="95" x2="155" y2="95"/>
      <line x1="50" y1="125" x2="155" y2="125"/><line x1="50" y1="155" x2="155" y2="155"/>
    </g>
    <!-- Wrap-around (red, problematic) -->
    <path d="M50,65 C20,65 20,155 50,155" stroke="#f85149" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
    <path d="M155,65 C185,65 185,155 155,155" stroke="#f85149" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
    <path d="M50,65 C50,40 155,40 155,65" stroke="#f85149" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
    <path d="M50,155 C50,180 155,180 155,155" stroke="#f85149" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
    <!-- Nodes -->
    <g fill="#3fb950">
      <circle cx="50" cy="65" r="4"/><circle cx="85" cy="65" r="4"/><circle cx="120" cy="65" r="4"/><circle cx="155" cy="65" r="4"/>
      <circle cx="50" cy="95" r="4"/><circle cx="85" cy="95" r="4"/><circle cx="120" cy="95" r="4"/><circle cx="155" cy="95" r="4"/>
      <circle cx="50" cy="125" r="4"/><circle cx="85" cy="125" r="4"/><circle cx="120" cy="125" r="4"/><circle cx="155" cy="125" r="4"/>
      <circle cx="50" cy="155" r="4"/><circle cx="85" cy="155" r="4"/><circle cx="120" cy="155" r="4"/><circle cx="155" cy="155" r="4"/>
    </g>
    <text x="100" y="192" fill="#f85149" font-size="10" font-weight="600" text-anchor="middle">Wrap-around = long wires</text>
  </g>

  <!-- 4. Dragonfly -->
  <g transform="translate(675, 80)">
    <rect width="200" height="200" fill="#161b22" stroke="#30363d" rx="8"/>
    <text x="100" y="24" fill="#f0f6fc" font-size="14" font-weight="600" text-anchor="middle">Dragonfly</text>
    <!-- Group 1 (all-to-all) -->
    <g stroke="#f8514960" stroke-width="0.8" fill="none">
      <line x1="50" y1="70" x2="90" y2="70"/><line x1="50" y1="70" x2="70" y2="100"/>
      <line x1="90" y1="70" x2="70" y2="100"/><line x1="50" y1="70" x2="110" y2="100"/>
      <line x1="90" y1="70" x2="110" y2="100"/><line x1="70" y1="100" x2="110" y2="100"/>
    </g>
    <circle cx="50" cy="70" r="4" fill="#58a6ff"/><circle cx="90" cy="70" r="4" fill="#58a6ff"/>
    <circle cx="70" cy="100" r="4" fill="#58a6ff"/><circle cx="110" cy="100" r="4" fill="#58a6ff"/>
    <text x="75" y="60" fill="#8b949e" font-size="9" text-anchor="middle">Group 0</text>
    <!-- Group 2 -->
    <g stroke="#f8514960" stroke-width="0.8" fill="none">
      <line x1="110" y1="130" x2="150" y2="130"/><line x1="110" y1="130" x2="130" y2="160"/>
      <line x1="150" y1="130" x2="130" y2="160"/><line x1="110" y1="130" x2="170" y2="160"/>
      <line x1="150" y1="130" x2="170" y2="160"/><line x1="130" y1="160" x2="170" y2="160"/>
    </g>
    <circle cx="110" cy="130" r="4" fill="#58a6ff"/><circle cx="150" cy="130" r="4" fill="#58a6ff"/>
    <circle cx="130" cy="160" r="4" fill="#58a6ff"/><circle cx="170" cy="160" r="4" fill="#58a6ff"/>
    <text x="145" y="120" fill="#8b949e" font-size="9" text-anchor="middle">Group 1</text>
    <!-- Inter-group links -->
    <line x1="110" y1="100" x2="110" y2="130" stroke="#f85149" stroke-width="2" stroke-dasharray="4,3"/>
    <line x1="90" y1="70" x2="150" y2="130" stroke="#f85149" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="100" y="192" fill="#f85149" font-size="10" font-weight="600" text-anchor="middle">All-to-all = 12x wiring</text>
  </g>

  <!-- Bottom: the winner -->
  <g transform="translate(30, 300)">
    <rect width="840" height="200" fill="#161b22" stroke="#3fb950" stroke-width="2" rx="10"/>
    <text x="420" y="30" fill="#3fb950" font-size="16" font-weight="700" text-anchor="middle">The solution: 4-level mesh + crossbar hybrid, Seal Core at center</text>

    <!-- Chip -->
    <rect x="40" y="50" width="760" height="130" fill="#0d1117" stroke="#30363d" rx="6"/>
    <text x="60" y="70" fill="#8b949e" font-size="10">CHIP (L3)</text>

    <!-- Region 0 -->
    <rect x="55" y="78" width="240" height="92" fill="#0f1525" stroke="#1e3a5a" rx="5" stroke-dasharray="3,2"/>
    <text x="65" y="92" fill="#4a7acc" font-size="8" font-weight="600">Region 0 (L2)</text>
    <!-- Tile 0 in Region 0 -->
    <rect x="62" y="96" width="110" height="68" fill="#101828" stroke="#2a4a7a" rx="4"/>
    <text x="70" y="108" fill="#58a6ff" font-size="7" font-weight="600">Tile (L1)</text>
    <!-- Clusters with 4x4 core dots -->
    <rect x="68" y="112" width="46" height="22" rx="2" fill="#1a2a1a" stroke="#3a6a3a"/>
    <rect x="68" y="137" width="46" height="22" rx="2" fill="#1a2a1a" stroke="#3a6a3a"/>
    <rect x="118" y="112" width="46" height="22" rx="2" fill="#1a2a1a" stroke="#3a6a3a"/>
    <rect x="118" y="137" width="46" height="22" rx="2" fill="#1a2a1a" stroke="#3a6a3a"/>
    <!-- Core dots in cluster -->
    <g fill="#3fb950">
      <circle cx="76" cy="119" r="1.5"/><circle cx="83" cy="119" r="1.5"/><circle cx="90" cy="119" r="1.5"/><circle cx="97" cy="119" r="1.5"/>
      <circle cx="76" cy="127" r="1.5"/><circle cx="83" cy="127" r="1.5"/><circle cx="90" cy="127" r="1.5"/><circle cx="97" cy="127" r="1.5"/>
      <circle cx="76" cy="144" r="1.5"/><circle cx="83" cy="144" r="1.5"/><circle cx="90" cy="144" r="1.5"/><circle cx="97" cy="144" r="1.5"/>
      <circle cx="76" cy="152" r="1.5"/><circle cx="83" cy="152" r="1.5"/><circle cx="90" cy="152" r="1.5"/><circle cx="97" cy="152" r="1.5"/>
      <circle cx="126" cy="119" r="1.5"/><circle cx="133" cy="119" r="1.5"/><circle cx="140" cy="119" r="1.5"/><circle cx="147" cy="119" r="1.5"/>
      <circle cx="126" cy="127" r="1.5"/><circle cx="133" cy="127" r="1.5"/><circle cx="140" cy="127" r="1.5"/><circle cx="147" cy="127" r="1.5"/>
      <circle cx="126" cy="144" r="1.5"/><circle cx="133" cy="144" r="1.5"/><circle cx="140" cy="144" r="1.5"/><circle cx="147" cy="144" r="1.5"/>
      <circle cx="126" cy="152" r="1.5"/><circle cx="133" cy="152" r="1.5"/><circle cx="140" cy="152" r="1.5"/><circle cx="147" cy="152" r="1.5"/>
    </g>
    <!-- L1 crossbar in tile center -->
    <rect x="95" y="130" width="18" height="10" rx="2" fill="#2a4a7a" stroke="#58a6ff" stroke-width="0.8"/>
    <text x="104" y="137" fill="#58a6ff" font-size="5" text-anchor="middle">XB</text>

    <!-- Tile 1 in Region 0 -->
    <rect x="180" y="96" width="110" height="68" fill="#101828" stroke="#2a4a7a" rx="4"/>
    <text x="188" y="108" fill="#58a6ff" font-size="7" font-weight="600">Tile (L1)</text>
    <rect x="186" y="112" width="46" height="22" rx="2" fill="#1a2a1a" stroke="#3a6a3a"/>
    <rect x="186" y="137" width="46" height="22" rx="2" fill="#1a2a1a" stroke="#3a6a3a"/>
    <rect x="236" y="112" width="46" height="22" rx="2" fill="#1a2a1a" stroke="#3a6a3a"/>
    <rect x="236" y="137" width="46" height="22" rx="2" fill="#1a2a1a" stroke="#3a6a3a"/>
    <!-- L1 crossbar -->
    <rect x="213" y="130" width="18" height="10" rx="2" fill="#2a4a7a" stroke="#58a6ff" stroke-width="0.8"/>
    <text x="222" y="137" fill="#58a6ff" font-size="5" text-anchor="middle">XB</text>
    <!-- L2 crossbar in region center -->
    <rect x="141" y="86" width="24" height="10" rx="2" fill="#1e3a5a" stroke="#4a7acc" stroke-width="0.8"/>
    <text x="153" y="93" fill="#4a7acc" font-size="5" text-anchor="middle">L2 XB</text>

    <!-- Region 1 (simplified) -->
    <rect x="310" y="78" width="100" height="92" fill="#0f1525" stroke="#1e3a5a" rx="5" stroke-dasharray="3,2"/>
    <text x="320" y="92" fill="#4a7acc" font-size="8" font-weight="600">Region 1</text>
    <rect x="318" y="96" width="40" height="30" rx="3" fill="#101828" stroke="#2a4a7a"/>
    <rect x="362" y="96" width="40" height="30" rx="3" fill="#101828" stroke="#2a4a7a"/>
    <rect x="318" y="130" width="40" height="30" rx="3" fill="#101828" stroke="#2a4a7a"/>
    <rect x="362" y="130" width="40" height="30" rx="3" fill="#101828" stroke="#2a4a7a"/>
    <text x="360" y="173" fill="#8b949e" font-size="7" text-anchor="middle">8 tile × 8 cl. × 16 core</text>

    <!-- ... regions -->
    <rect x="425" y="78" width="60" height="92" fill="#0f1525" stroke="#1e3a5a" rx="5" stroke-dasharray="4,3"/>
    <text x="455" y="128" fill="#4a7acc" font-size="11" text-anchor="middle">...</text>

    <!-- SEAL CORE + L3 CROSSBAR at center -->
    <rect x="500" y="85" width="100" height="75" fill="#1a0a0a" stroke="#f0883e" stroke-width="2" rx="6"/>
    <text x="550" y="103" fill="#f0883e" font-size="9" font-weight="700" text-anchor="middle">SEAL CORE</text>
    <text x="550" y="115" fill="#f0883e" font-size="8" text-anchor="middle">+ L3 Crossbar</text>
    <text x="550" y="130" fill="#8b949e" font-size="7" text-anchor="middle">star center</text>
    <text x="550" y="142" fill="#8b949e" font-size="7" text-anchor="middle">sees all traffic</text>
    <!-- Star links from regions to Seal Core -->
    <line x1="295" y1="124" x2="500" y2="115" stroke="#f0883e" stroke-width="1.2" stroke-dasharray="3,2"/>
    <line x1="410" y1="124" x2="500" y2="120" stroke="#f0883e" stroke-width="1.2" stroke-dasharray="3,2"/>
    <line x1="485" y1="124" x2="500" y2="124" stroke="#f0883e" stroke-width="1.2" stroke-dasharray="3,2"/>

    <!-- Region N -->
    <rect x="615" y="78" width="100" height="92" fill="#0f1525" stroke="#1e3a5a" rx="5" stroke-dasharray="3,2"/>
    <text x="625" y="92" fill="#4a7acc" font-size="8" font-weight="600">Region N</text>
    <rect x="623" y="96" width="40" height="30" rx="3" fill="#101828" stroke="#2a4a7a"/>
    <rect x="667" y="96" width="40" height="30" rx="3" fill="#101828" stroke="#2a4a7a"/>
    <rect x="623" y="130" width="40" height="30" rx="3" fill="#101828" stroke="#2a4a7a"/>
    <rect x="667" y="130" width="40" height="30" rx="3" fill="#101828" stroke="#2a4a7a"/>
    <line x1="615" y1="124" x2="600" y2="120" stroke="#f0883e" stroke-width="1.2" stroke-dasharray="3,2"/>

    <!-- Labels -->
    <text x="100" y="173" fill="#3a6a3a" font-size="7" text-anchor="middle">L0: 4×4 mesh (16 core)</text>

    <!-- Labels right side -->
    <g transform="translate(730, 85)">
      <text x="0" y="0" fill="#3fb950" font-size="11" font-weight="600">~20% chip</text>
      <text x="0" y="16" fill="#c9d1d9" font-size="10">~99% throughput</text>
      <text x="0" y="32" fill="#c9d1d9" font-size="10">~59 cyc worst</text>
      <text x="0" y="48" fill="#c9d1d9" font-size="10">18 hop max</text>
      <text x="0" y="64" fill="#c9d1d9" font-size="10">0 deadlock</text>
      <text x="0" y="80" fill="#c9d1d9" font-size="10">0 shared mem</text>
    </g>
  </g>
</svg>
